spring.application.name=demo
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/demo?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

server.servlet.session.timeout=10m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict

server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ============ OAuth2 Configuration ============
# Google OAuth2 - Đăng ký tại: https://console.cloud.google.com/
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.registration.google.client-id=386583134998-9g4fme7ausir5aed8lii0rfrnt2td715.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=GOCSPX-16y3
spring.security.oauth2.client.registration.google.scope=profile,email

# Facebook OAuth2 - Đăng ký tại: https://developers.facebook.com/
spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v18.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v18.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/me?fields=id,name,email,picture
spring.security.oauth2.client.provider.facebook.user-name-attribute=id
spring.security.oauth2.client.registration.facebook.client-id=1626996895230885
spring.security.oauth2.client.registration.facebook.client-secret=737db217c34f90f1b96ef33c2945e4c7
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.user-name-attribute=name

# ============ VNPay Configuration ============
# Đăng ký merchant tại: https://merchant.vnpay.vn
# Sử dụng sandbox: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.merchant.code=YOUR_MERCHANT_CODE
vnpay.merchant.hash-secret=YOUR_HASH_SECRET
vnpay.payment.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return.url=${app.base-url}/wallet/payment/vnpay/return

# ============ MoMo Configuration ============
# Đăng ký business tại: https://business.momo.vn
# Sử dụng sandbox: https://test-payment.momo.vn/v2/gateway/api/create
momo.partner.code=YOUR_PARTNER_CODE
momo.access.key=YOUR_ACCESS_KEY
momo.secret.key=YOUR_SECRET_KEY
momo.payment.url=https://test-payment.momo.vn/v2/gateway/api/create
momo.return.url=${app.base-url}/wallet/payment/momo/return

# ============ App Configuration ============
app.base-url=http://localhost:8080
