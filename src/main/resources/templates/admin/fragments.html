<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar (active)" class="admin-sidebar" aria-label="Admin menu">
    <div class="admin-sidebar-brand">
        <a th:href="@{/admin}">
            <span class="logo">🌸</span>
            <div>
                Genshin Cute Shop
                <small>Administration</small>
            </div>
        </a>
    </div>
    <nav class="admin-nav">
        <div class="admin-nav-section">Menu</div>
        <a th:href="@{/admin}" th:classappend="${active == 'dashboard'} ? ' is-active'">
            <span class="ic">📊</span> Tổng quan
        </a>
        <a th:href="@{/admin/users}" th:classappend="${active == 'users'} ? ' is-active'">
            <span class="ic">👤</span> Người dùng
        </a>
        <a th:href="@{/admin/accounts}" th:classappend="${active == 'accounts'} ? ' is-active'">
            <span class="ic">🎮</span> Quản lý genshin
        </a>
        <a th:href="@{/admin/packages}" th:classappend="${active == 'packages'} ? ' is-active'">
            <span class="ic">📦</span> Gói genshin
        </a>
        <a th:href="@{/admin/orders}" th:classappend="${active == 'orders'} ? ' is-active'">
            <span class="ic">🧾</span> Quản lý mua hàng
        </a>
        <a th:href="@{/reviews/admin/comments}" th:classappend="${active == 'comments'} ? ' is-active'">
            <span class="ic">💬</span> Quản lý bình luận
        </a>
        <a th:href="@{/admin/chat}" th:classappend="${active == 'chat'} ? ' is-active'">
            <span class="ic">💬</span> Quản lý Chat
        </a>
    </nav>
    <div class="admin-sidebar-footer">
        <a th:href="@{/}">← Về cửa hàng</a>
    </div>
</aside>
</body>
</html>
