<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review chờ duyệt — Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin-panel.css}">
    <style>
        .admin-table-container {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .admin-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .admin-table tbody tr:hover {
            background: #fffaf0;
        }
        .admin-table tbody tr:last-child td {
            border-bottom: none;
        }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f97316, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .user-name {
            font-weight: 600;
            color: #1e293b;
        }

        .stars-cell {
            color: #fbbf24;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .comment-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #64748b;
        }

        .images-cell {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .images-cell img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .actions-cell {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-sm {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-approve {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .btn-approve:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .btn-reject {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        .btn-reject:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        .btn-delete {
            background: #64748b;
            color: white;
        }
        .btn-delete:hover {
            background: #475569;
        }

        .product-tag {
            display: inline-block;
            background: #fef3c7;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #d97706;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: linear-gradient(135deg, #f97316, #ec4899);
            color: white;
            padding: 20px 30px;
            border-radius: 16px;
            min-width: 150px;
        }
        .stat-card.pending {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        .stat-card.approved {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .stat-card .stat-number {
            font-size: 2rem;
            font-weight: 800;
        }
        .stat-card .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        @media (max-width: 1024px) {
            .admin-table-container {
                overflow-x: auto;
            }
            .admin-table {
                min-width: 900px;
            }
        }
    </style>
</head>
<body class="admin-body">
<div class="admin-app">
    <aside th:replace="~{admin/fragments :: sidebar (active='reviews')}"></aside>
    <div class="admin-main">
        <header class="admin-main-header">
            <div>
                <div class="admin-breadcrumb"><a th:href="@{/admin}">Admin</a> / Review chờ duyệt</div>
                <h1>Review chờ duyệt</h1>
                <p>Kiểm duyệt đánh giá trước khi hiển thị công khai</p>
            </div>
        </header>
        <div class="admin-content">
            <div class="stats-row">
                <div class="stat-card pending">
                    <div class="stat-number" th:text="${pendingCount}">0</div>
                    <div class="stat-label">Đang chờ duyệt</div>
                </div>
                <a th:href="@{/reviews/admin/all}" style="text-decoration: none;">
                    <div class="stat-card">
                        <div class="stat-number">📋</div>
                        <div class="stat-label">Tất cả review</div>
                    </div>
                </a>
            </div>

            <div th:if="${#lists.isEmpty(pendingReviews)}" class="empty-state">
                <div class="icon">🎉</div>
                <p>Không có review nào đang chờ duyệt!</p>
            </div>

            <div class="admin-table-container" th:if="${!#lists.isEmpty(pendingReviews)}">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Người dùng</th>
                            <th>Đánh giá</th>
                            <th>Nội dung</th>
                            <th>Hình ảnh</th>
                            <th>Sản phẩm</th>
                            <th>Ngày tạo</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="review : ${pendingReviews}">
                            <td>
                                <div class="user-cell">
                                    <div class="user-avatar" th:text="${#strings.substring(review.username, 0, 1).toUpperCase()}">K</div>
                                    <span class="user-name" th:text="${review.username}">Username</span>
                                </div>
                            </td>
                            <td>
                                <span class="stars-cell">
                                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <span th:text="${i <= review.rating ? '★' : '☆'}"
                                              th:style="${i <= review.rating} ? 'color: #fbbf24' : 'color: #e2e8f0'">★</span>
                                    </th:block>
                                </span>
                            </td>
                            <td>
                                <span class="comment-cell" th:text="${review.comment != null and !review.comment.isEmpty()} ? ${review.comment} : '—'">
                                    Nội dung đánh giá...
                                </span>
                            </td>
                            <td>
                                <div class="images-cell" th:if="${review.imagePaths != null and !review.imagePaths.isEmpty()}">
                                    <img th:each="img : ${#strings.arraySplit(review.imagePaths, ',')}"
                                         th:src="${img}" alt="img">
                                </div>
                                <span th:if="${review.imagePaths == null or review.imagePaths.isEmpty()}" style="color: #94a3b8;">—</span>
                            </td>
                            <td>
                                <span class="product-tag" th:if="${review.productName != null}" th:text="${review.productName}">Genshin Impact</span>
                                <span th:if="${review.productName == null}" style="color: #94a3b8;">—</span>
                            </td>
                            <td style="white-space: nowrap; color: #64748b; font-size: 0.85rem;" th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}">
                                01/01/2024
                            </td>
                            <td>
                                <div class="actions-cell">
                                    <button class="btn-sm btn-approve"
                                            th:onclick="'approveReview(' + ${review.id} + ')'">
                                        ✓ Duyệt
                                    </button>
                                    <button class="btn-sm btn-reject"
                                            th:onclick="'rejectReview(' + ${review.id} + ')'">
                                        ✗ Từ chối
                                    </button>
                                    <button class="btn-sm btn-delete"
                                            th:onclick="'deleteReview(' + ${review.id} + ')'">
                                        🗑 Xóa
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    async function approveReview(id) {
        if (!confirm('Duyệt đánh giá này?')) return;
        try {
            const res = await fetch(`/reviews/admin/approve/${id}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                location.reload();
            } else {
                alert(data.message || 'Có lỗi xảy ra');
            }
        } catch (e) {
            alert('Có lỗi xảy ra: ' + e);
        }
    }

    async function rejectReview(id) {
        if (!confirm('Từ chối đánh giá này?')) return;
        try {
            const res = await fetch(`/reviews/admin/reject/${id}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                location.reload();
            } else {
                alert(data.message || 'Có lỗi xảy ra');
            }
        } catch (e) {
            alert('Có lỗi xảy ra: ' + e);
        }
    }

    async function deleteReview(id) {
        if (!confirm('Xóa đánh giá này vĩnh viễn?')) return;
        try {
            const res = await fetch(`/reviews/admin/delete/${id}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                location.reload();
            } else {
                alert(data.message || 'Có lỗi xảy ra');
            }
        } catch (e) {
            alert('Có lỗi xảy ra: ' + e);
        }
    }
</script>
</body>
</html>
