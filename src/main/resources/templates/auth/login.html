<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/auth-cute.css}">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow purple"></div>
    <div class="bg-glow pink"></div>

    <div class="floating-shapes" aria-hidden="true">
        <span>&#9670;</span><span>&#9671;</span><span>&#9733;</span><span>&#10022;</span>
        <span>&#9670;</span><span>&#9671;</span><span>&#9733;</span><span>&#10022;</span>
    </div>

    <a th:href="@{/}" class="page-back">
        <i class="fas fa-arrow-left"></i> Quay lại
    </a>

    <div class="card">
        <div class="glow-badge">System Access</div>
        <h2 class="title">Đăng nhập</h2>
        <p class="subtitle">Nhập tên người dùng và mật khẩu để vào hệ thống.</p>

        <div class="msg error" th:if="${errorMessage}">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${errorMessage}"></span>
        </div>
        <div class="msg success" th:if="${successMessage}">
            <i class="fas fa-check-circle"></i>
            <span th:text="${successMessage}"></span>
        </div>

        <form th:action="@{/auth/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Nhập username của bạn" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <button class="btn" type="submit">
                <i class="fas fa-sign-in-alt"></i> Đăng nhập
            </button>
        </form>

        <div class="divider">hoặc đăng nhập với</div>

        <div class="social-login">
            <button type="button" id="btn-google" class="btn-social btn-google">
                <i class="fab fa-google"></i> Google
            </button>
            <button type="button" id="btn-facebook" class="btn-social btn-facebook">
                <i class="fab fa-facebook-f"></i> Facebook
            </button>
        </div>

        <div class="links">
            <a th:href="@{/auth/forgot-password}">Quên mật khẩu</a>
            <a th:href="@{/auth/register}">Đăng ký</a>
        </div>
    </div>

    <!-- Firebase Config -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWhzu4mM6R3xrXudyZfHvP2_KPa64F434",
            authDomain: "shop-80e86.firebaseapp.com",
            projectId: "shop-80e86",
            storageBucket: "shop-80e86.firebasestorage.app",
            messagingSenderId: "80006920606",
            appId: "1:80006920606:web:ba22e39b5d71c06d2cfe8f"
        };
        
        firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        
        // Prevent multiple popups
        let isSigningIn = false;
        
        // Facebook Provider
        const facebookProvider = new firebase.auth.FacebookAuthProvider();

        // Google Provider  
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        
        // Google Sign In
        document.getElementById('btn-google').addEventListener('click', async () => {
            if (isSigningIn) return;
            isSigningIn = true;
            
            console.log('Starting Google sign in...');
            
            try {
                const result = await auth.signInWithPopup(googleProvider);
                const idToken = await result.user.getIdToken();
                
                console.log('Got token, sending to backend...');
                
                const response = await fetch('/auth/firebase-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: idToken, provider: 'google' })
                });
                
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const error = await response.json();
                    alert('Đăng nhập thất bại: ' + (error.error || 'Lỗi không xác định'));
                }
            } catch (error) {
                console.error('Google sign-in error:', error);
                if (error.code !== 'auth/popup-closed-by-user' && error.code !== 'auth/cancelled-popup-request') {
                    alert('Đăng nhập Google thất bại: ' + error.message);
                }
            } finally {
                isSigningIn = false;
            }
        });
        
        // Facebook Sign In
        document.getElementById('btn-facebook').addEventListener('click', async () => {
            if (isSigningIn) return;
            isSigningIn = true;
            
            console.log('Starting Facebook sign in...');
            
            try {
                const result = await auth.signInWithPopup(facebookProvider);
                const idToken = await result.user.getIdToken();
                
                console.log('Got token, sending to backend...');
                
                const response = await fetch('/auth/firebase-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: idToken, provider: 'facebook' })
                });
                
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const error = await response.json();
                    alert('Đăng nhập thất bại: ' + (error.error || 'Lỗi không xác định'));
                }
            } catch (error) {
                console.error('Facebook sign-in error:', error);
                if (error.code !== 'auth/popup-closed-by-user' && error.code !== 'auth/cancelled-popup-request') {
                    alert('Đăng nhập Facebook thất bại: ' + error.message);
                }
            } finally {
                isSigningIn = false;
            }
        });
    </script>
</body>
</html>
