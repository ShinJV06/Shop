<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth-cute.css}">
</head>
<body>
<div class="falling-hearts" aria-hidden="true">
    <span>❤</span><span>✿</span><span>❤</span><span>❀</span><span>❤</span>
    <span>✿</span><span>❤</span><span>❀</span><span>❤</span><span>✿</span>
</div>
<div class="page-wrap">
    <div class="card">
        <div class="badge">❤ Sparkle Register ❤</div>
        <h2 class="title">Tạo tài khoản mới</h2>
        <p class="subtitle">Vui lòng nhập thông tin của bạn.</p>

        <div class="msg error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="msg success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <form th:action="@{/auth/register}" method="post">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <label>Phone</label>
            <input type="text" name="phone" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <button class="btn" type="submit">Đăng ký</button>
        </form>

        <div class="links">
            <a th:href="@{/auth/login}">Đăng nhập</a>
            <a th:href="@{/auth}">Trang chính</a>
        </div>
    </div>
</div>
</body>
</html>
