<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/auth-cute.css}">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow purple"></div>
    <div class="bg-glow pink"></div>

    <div class="floating-shapes" aria-hidden="true">
        <span>&#9670;</span><span>&#9671;</span><span>&#9733;</span><span>&#10022;</span>
        <span>&#9670;</span><span>&#9671;</span><span>&#9733;</span><span>&#10022;</span>
    </div>

    <a th:href="@{/}" class="page-back">
        <i class="fas fa-arrow-left"></i> Quay lại
    </a>

    <div class="card">
        <div class="glow-badge">System Access</div>
        <h2 class="title">Đăng nhập</h2>
        <p class="subtitle">Nhập tên người dùng và mật khẩu để vào hệ thống.</p>

        <div class="msg error" th:if="${errorMessage}">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${errorMessage}"></span>
        </div>
        <div class="msg success" th:if="${successMessage}">
            <i class="fas fa-check-circle"></i>
            <span th:text="${successMessage}"></span>
        </div>

        <form th:action="@{/auth/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Nhập username của bạn" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <button class="btn" type="submit">
                <i class="fas fa-sign-in-alt"></i> Đăng nhập
            </button>
        </form>

        <div class="divider">hoặc đăng nhập với</div>

        <div class="social-login">
            <a th:href="@{/oauth2/authorization/google}" class="btn-social btn-google">
                <i class="fab fa-google"></i> Google
            </a>
            <a th:href="@{/oauth2/authorization/facebook}" class="btn-social btn-facebook">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
        </div>

        <div class="links">
            <a th:href="@{/auth/forgot-password}">Quên mật khẩu</a>
            <a th:href="@{/auth/register}">Đăng ký</a>
        </div>
    </div>
</body>
</html>
