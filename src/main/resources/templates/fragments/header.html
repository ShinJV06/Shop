<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Fragment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ===== SHARED HEADER STYLES ===== */
        .header { 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 32px; 
            height: 68px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 3px solid transparent;
            background-image: 
                linear-gradient(rgba(255,255,255,0.98), rgba(255,255,255,0.98)),
                linear-gradient(90deg, #ff6b6b, #ff8e53, #ffb347, #ffd93d, #4ecdc4, #ff6b6b);
            background-origin: padding-box, border-box;
            background-clip: padding-box, border-box;
            background-size: 100% 100%, 400% 100%;
            animation: borderFlowSummer 4s linear infinite;
            box-shadow: 
                0 4px 20px rgba(255, 107, 107, 0.15),
                0 8px 40px rgba(78, 205, 196, 0.1);
            transition: box-shadow 0.3s ease;
        }

        .header:hover {
            box-shadow: 
                0 6px 30px rgba(255, 107, 107, 0.2),
                0 12px 50px rgba(78, 205, 196, 0.15);
        }

        @keyframes borderFlowSummer {
            0% { background-position: 0 0, 0 50%; }
            100% { background-position: 0 0, 400% 50%; }
        }

        .logo-wrapper {
            position: relative;
            width: 50px;
            height: 50px;
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-4px) rotate(2deg); }
            50% { transform: translateY(-6px) rotate(0deg); }
            75% { transform: translateY(-4px) rotate(-2deg); }
        }

        .brand-img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
            box-shadow:
                0 0 0 3px rgba(255,255,255,0.95),
                0 0 25px rgba(255, 107, 107, 0.6),
                0 0 50px rgba(255, 183, 77, 0.3);
            animation: logoShine 2s ease-in-out infinite;
        }

        @keyframes logoShine {
            0%, 100% {
                filter: brightness(1) saturate(1);
                box-shadow:
                    0 0 0 3px rgba(255,255,255,0.95),
                    0 0 25px rgba(255, 107, 107, 0.6),
                    0 0 50px rgba(255, 183, 77, 0.3);
            }
            50% {
                filter: brightness(1.1) saturate(1.15);
                box-shadow:
                    0 0 0 3px rgba(255,255,255,0.95),
                    0 0 35px rgba(255, 107, 107, 0.8),
                    0 0 60px rgba(255, 183, 77, 0.5),
                    0 0 80px rgba(78, 205, 196, 0.3);
            }
        }

        .logo-glow {
            position: absolute;
            inset: -6px;
            border-radius: 16px;
            z-index: 1;
            background: linear-gradient(135deg,
                #ff6b6b 0%,
                #ff8e53 20%,
                #ffb347 40%,
                #ffd93d 60%,
                #6bcb77 75%,
                #4ecdc4 90%,
                #ff6b6b 100%
            );
            background-size: 300% 300%;
            animation: summerGradient 4s ease infinite, borderPulse 2s ease-in-out infinite;
            opacity: 0.7;
            filter: blur(3px);
        }

        @keyframes summerGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo-engine {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 8px;
            background: linear-gradient(to top, #ff6b6b, #ffb347, #ffd93d, transparent);
            border-radius: 50%;
            z-index: 1;
            animation: summerFlicker 0.6s ease-in-out infinite alternate;
            filter: blur(1px);
        }

        @keyframes summerFlicker {
            0% { opacity: 0.6; transform: translateX(-50%) scaleX(0.85); filter: blur(1px) hue-rotate(0deg); }
            100% { opacity: 1; transform: translateX(-50%) scaleX(1.15); filter: blur(1.5px) hue-rotate(15deg); }
        }

        .logo-wrapper::before,
        .logo-wrapper::after {
            content: '✦';
            position: absolute;
            font-size: 8px;
            color: #ffd93d;
            animation: sparkle 1.5s ease-in-out infinite;
            z-index: 3;
            text-shadow: 0 0 6px #ffd93d, 0 0 12px #ffb347;
        }

        .logo-wrapper::before {
            top: -2px;
            right: -4px;
            animation-delay: 0s;
        }

        .logo-wrapper::after {
            bottom: -4px;
            left: -2px;
            animation-delay: 0.75s;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
        }

        .brand-img:hover {
            transform: scale(1.12) rotate(3deg);
            box-shadow:
                0 0 0 3px #fff,
                0 0 40px rgba(255, 107, 107, 0.9),
                0 0 70px rgba(255, 183, 77, 0.6),
                0 0 100px rgba(78, 205, 196, 0.4);
        }

        .brand { 
            font-size: 1.15rem; 
            font-weight: 800; 
            font-family: 'Orbitron', sans-serif; 
            color: #fff; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .brand-text {
            background: linear-gradient(135deg,
                #ff6b6b 0%,
                #ff8e53 15%,
                #ffb347 30%,
                #ffd93d 45%,
                #4ecdc4 60%,
                #45b7d1 75%,
                #96ceb4 85%,
                #ff6b6b 100%
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: summerText 4s ease-in-out infinite, textPulse 2s ease-in-out infinite;
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
            filter: drop-shadow(0 0 15px rgba(255, 183, 77, 0.8)) drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            position: relative;
        }

        @keyframes summerText {
            0% { background-position: 0% 50%; filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.8)) drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
            25% { filter: drop-shadow(0 0 20px rgba(255, 183, 77, 0.9)) drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
            50% { background-position: 100% 50%; filter: drop-shadow(0 0 25px rgba(78, 205, 196, 0.9)) drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
            75% { filter: drop-shadow(0 0 20px rgba(255, 142, 83, 0.9)) drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
            100% { background-position: 0% 50%; filter: drop-shadow(0 0 15px rgba(255, 107, 107, 0.8)) drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        }

        @keyframes textPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .brand-text::before,
        .brand-text::after {
            content: '🌴';
            position: absolute;
            font-size: 14px;
            -webkit-text-fill-color: initial;
            animation: palmSway 2.5s ease-in-out infinite;
        }

        .brand-text::before {
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            animation-delay: 0s;
        }

        .brand-text::after {
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            animation-delay: 1.25s;
        }

        @keyframes palmSway {
            0%, 100% { transform: translateY(-50%) rotate(-5deg); }
            50% { transform: translateY(-55%) rotate(5deg); }
        }

        .brand-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg,
                #ff6b6b 0%,
                #ff8e53 25%,
                #ffb347 50%,
                #ffd93d 75%,
                #4ecdc4 100%
            );
            background-size: 200% 200%;
            animation: summerBrandBg 3s ease infinite;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
            box-shadow:
                0 4px 20px rgba(255, 107, 107, 0.5),
                0 0 20px rgba(255, 183, 77, 0.4),
                0 0 30px rgba(78, 205, 196, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.4);
            animation: summerBrandBg 3s ease infinite, brandPulseSummer 1.5s ease-in-out infinite;
            position: relative;
            overflow: visible;
        }

        @keyframes summerBrandBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .brand-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.5), transparent 50%);
            animation: iconShineSummer 2s ease-in-out infinite;
            border-radius: 14px;
        }

        .brand-icon::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 15px;
            background: radial-gradient(ellipse at center,
                rgba(255, 183, 77, 1) 0%,
                rgba(255, 142, 83, 0.8) 30%,
                rgba(255, 107, 107, 0.5) 60%,
                transparent 80%
            );
            animation: engineGlowSummer 0.5s ease-in-out infinite alternate;
            border-radius: 50%;
            filter: blur(3px);
        }

        @keyframes brandPulseSummer {
            0%, 100% {
                transform: scale(1) rotate(0deg);
                box-shadow:
                    0 4px 25px rgba(255, 107, 107, 0.5),
                    0 0 20px rgba(255, 183, 77, 0.4),
                    0 0 30px rgba(78, 205, 196, 0.3);
            }
            50% {
                transform: scale(1.08) rotate(1deg);
                box-shadow:
                    0 6px 35px rgba(255, 107, 107, 0.7),
                    0 0 35px rgba(255, 183, 77, 0.6),
                    0 0 50px rgba(78, 205, 196, 0.4);
            }
        }

        @keyframes iconShineSummer {
            0%, 100% { opacity: 0.4; transform: translateX(-5px); }
            50% { opacity: 1; transform: translateX(5px); }
        }

        @keyframes engineGlowSummer {
            0% { opacity: 0.7; transform: translateX(-50%) scaleX(0.8); filter: blur(2px) hue-rotate(-10deg); }
            100% { opacity: 1; transform: translateX(-50%) scaleX(1.2); filter: blur(4px) hue-rotate(10deg); }
        }

        @keyframes borderPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .nav { 
            display: flex; 
            align-items: center; 
            gap: 4px;
            position: relative;
            z-index: 1;
        }

        .nav a { 
            text-decoration: none; 
            color: #475569; 
            font-size: 0.88rem; 
            font-weight: 700; 
            padding: 10px 16px; 
            border-radius: 12px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .nav a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(220,38,38,0.15), rgba(249,115,22,0.1));
            border-radius: 12px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .nav a:hover { 
            color: #dc2626;
            transform: translateY(-2px);
        }

        .nav a:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .nav a span {
            position: relative;
            z-index: 1;
        }

        .nav a.active {
            color: #dc2626;
            background: rgba(220,38,38,0.1);
        }

        .nav a.active::before {
            opacity: 1;
            transform: scale(1);
        }

        .nav .cta { 
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: #fff !important; 
            padding: 12px 22px; 
            border-radius: 14px;
            font-weight: 700;
            box-shadow: 
                0 4px 20px rgba(220, 38, 38, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .nav .cta:hover { 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 
                0 8px 30px rgba(220, 38, 38, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .nav .cta::before {
            display: none;
        }

        .cart-badge { 
            min-width: 22px; 
            height: 22px; 
            padding: 0 6px; 
            border-radius: 999px; 
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #fff; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.7rem; 
            font-weight: 700;
            box-shadow: 0 2px 10px rgba(245, 158, 11, 0.5);
            animation: badgeBounce 2s ease-in-out infinite;
        }

        @keyframes badgeBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .user-menu { position: relative; }

        .user-trigger { 
            width: 42px; 
            height: 42px; 
            border: 2px solid rgba(220, 38, 38, 0.2); 
            border-radius: 50%; 
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            cursor: pointer; 
            overflow: hidden; 
            transition: all 0.3s ease;
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.15);
        }

        .user-trigger:hover { 
            border-color: #dc2626;
            transform: scale(1.08);
            box-shadow: 0 6px 25px rgba(220, 38, 38, 0.3);
        }

        .user-trigger img { width: 100%; height: 100%; object-fit: cover; }

        .user-trigger .default-avatar { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
        }

        .user-trigger .default-avatar i { color: #dc2626; font-size: 1.1rem; }

        .user-dropdown { 
            position: absolute; 
            top: calc(100% + 14px); 
            right: 0; 
            min-width: 220px; 
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(220, 38, 38, 0.15);
            border-radius: 18px; 
            padding: 18px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(220, 38, 38, 0.1);
            display: none;
            animation: dropdownPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes dropdownPop {
            from { opacity: 0; transform: scale(0.9) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .user-dropdown.open { display: block; }

        .user-name { 
            color: #dc2626; 
            font-size: 0.9rem; 
            font-weight: 700; 
            margin-bottom: 12px; 
            padding-bottom: 12px; 
            border-bottom: 2px solid rgba(220, 38, 38, 0.1);
            font-family: 'Orbitron', sans-serif;
            text-align: center;
        }

        .user-wallet { 
            background: linear-gradient(135deg, rgba(22,163,74,0.12), rgba(22,163,74,0.05));
            border: 1px solid rgba(22,163,74,0.25); 
            border-radius: 12px; 
            padding: 12px 14px; 
            margin-bottom: 14px; 
            font-size: 0.88rem; 
            font-weight: 700; 
            color: #16a34a; 
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.1);
        }

        .user-wallet::before {
            content: '💰';
        }

        .user-logout { 
            width: 100%; 
            border: none; 
            border-radius: 12px; 
            padding: 12px;
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: #fff; 
            font-weight: 700; 
            font-family: inherit; 
            cursor: pointer; 
            font-size: 0.88rem; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }

        .user-logout:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(220, 38, 38, 0.4);
        }

        .nav-compare { 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid rgba(220, 38, 38, 0.2); 
            border-radius: 12px; 
            padding: 10px 14px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: #dc2626; 
            text-decoration: none; 
            transition: all 0.3s ease;
        }

        .nav-compare:hover { 
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.35);
        }

        .compare-badge { 
            min-width: 20px; 
            height: 20px; 
            padding: 0 6px; 
            border-radius: 999px; 
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: #fff; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.68rem; 
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.3);
        }

        /* ===== USER MENU SCRIPT ===== */
        .user-menu { position: relative; }
    </style>
</head>
<body>
    <!-- HEADER FRAGMENT -->
    <th:block th:fragment="header">
        <header class="header" th:id="${headerId != null ? headerId : 'header'}">
            <a class="brand" th:href="@{/}">
                <div class="logo-wrapper" th:if="${session.avatarUrl != null}">
                    <img class="brand-img" th:src="@{${session.avatarUrl}}" alt="Logo">
                    <div class="logo-glow"></div>
                    <div class="logo-engine"></div>
                </div>
                <div class="logo-wrapper" th:unless="${session.avatarUrl != null}">
                    <img class="brand-img" src="/images/logo.png" alt="Logo">
                    <div class="logo-glow"></div>
                    <div class="logo-engine"></div>
                </div>
                <span class="brand-text">Genshin Cute Shop</span>
            </a>
            <nav class="nav">
                <a th:href="@{/}" th:class="${currentPage == 'home'} ? 'active' : ''"><span>Trang chủ</span></a>
                <a th:href="@{/minigame}" th:class="${currentPage == 'minigame'} ? 'active' : ''"><span>&#127918; Mini Game</span></a>
                <a th:href="@{/product}" th:class="${currentPage == 'product'} ? 'active' : ''"><span>Mua ngay</span></a>
                <a th:href="@{/reviews}" th:class="${currentPage == 'reviews'} ? 'active' : ''"><span>&#11088; Đánh giá</span></a>
                <a th:href="@{/cart}" th:class="${currentPage == 'cart'} ? 'active' : ''"><span>&#128722; Giỏ hàng <span class="cart-badge" id="cart-count" th:text="${cartCount != null ? cartCount : 0}">0</span></span></a>
                <a th:href="@{/wallet}" th:if="${session.userId != null}" th:class="${currentPage == 'wallet'} ? 'active' : ''"><span>&#128176; Nạp tiền</span></a>
                <a th:href="@{/profile}" th:if="${session.userId != null}" th:class="${currentPage == 'profile'} ? 'active' : ''"><span>Hồ sơ</span></a>
                <a th:href="@{/my-orders}" th:if="${session.userId != null}" th:class="${currentPage == 'my-orders'} ? 'active' : ''"><span>Đơn mua</span></a>
                <a th:href="@{/admin}" th:if="${session.role == 'ADMIN'}" th:class="${currentPage == 'admin'} ? 'active' : ''"><span>Admin</span></a>
                <a th:href="@{/ctv/submit}" th:if="${session.role == 'CTV'}" th:class="${currentPage == 'ctv'} ? 'active' : ''"><span>CTV</span></a>
                <a th:href="@{/contact}" th:class="${currentPage == 'contact'} ? 'active' : ''"><span>Liên hệ</span></a>
                <a th:href="@{/auth/login}" th:if="${session.userId == null}" th:class="${currentPage == 'login'} ? 'active' : ''"><span>Đăng nhập</span></a>
                <a class="cta" th:href="@{/auth/register}" th:if="${session.userId == null}" th:class="${currentPage == 'register'} ? 'active cta' : 'cta'">Đăng ký ngay</a>
                <div class="user-menu" th:if="${session.userId != null}">
                    <div class="user-trigger" id="userMenuTrigger">
                        <img th:if="${session.avatarUrl != null}" th:src="@{${session.avatarUrl}}" alt="User avatar" loading="lazy">
                        <span th:unless="${session.avatarUrl != null}" class="default-avatar">
                            <i class="fas fa-user"></i>
                        </span>
                    </div>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="user-name" th:text="${session.username}">Username</div>
                        <div class="user-wallet" th:if="${session.wallet != null}">
                            Số dư: <span th:text="${session.wallet}">0</span>
                        </div>
                        <a th:href="@{/my-orders}" style="display:block;padding:10px 0;font-weight:800;color:#dc2626;text-decoration:none;font-size:0.88rem;text-align:center">&#128203; Lịch sử mua</a>
                        <form th:action="@{/auth/logout}" method="post" style="margin-top:8px">
                            <button class="user-logout" type="submit">Đăng xuất</button>
                        </form>
                    </div>
                </div>
            </nav>
        </header>

        <script>
            // User menu dropdown
            document.addEventListener('DOMContentLoaded', function() {
                const userMenuTrigger = document.getElementById('userMenuTrigger');
                const userDropdown = document.getElementById('userDropdown');
                
                if (userMenuTrigger && userDropdown) {
                    userMenuTrigger.addEventListener('click', function(event) {
                        event.stopPropagation();
                        userDropdown.classList.toggle('open');
                    });
                    
                    document.addEventListener('click', function(event) {
                        if (!userDropdown.contains(event.target) && !userMenuTrigger.contains(event.target)) {
                            userDropdown.classList.remove('open');
                        }
                    });
                }
            });
        </script>
    </th:block>
</body>
</html>
