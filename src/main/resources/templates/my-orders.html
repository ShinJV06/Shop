<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử mua hàng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #f472b6; --soft: #fce7f3; --text: #4a2040; --mute: #9d6580; }
        body { font-family: 'Nunito', sans-serif; background: #fff7f9; color: var(--text); margin: 0; padding: 24px 20px 48px; }
        .top { max-width: 720px; margin: 0 auto 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 12px; justify-content: space-between; }
        a { color: #a855f7; font-weight: 800; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1 { font-size: 1.5rem; margin: 0; }
        p.sub { color: var(--mute); margin: 8px 0 0; font-weight: 600; }
        .panel { max-width: 720px; margin: 0 auto; background: rgba(255,255,255,0.9); border: 1.5px solid #fbcfe8; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 28px rgba(244,114,182,0.12); }
        table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--soft); }
        th { background: #fdf2f8; color: var(--mute); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover td { background: #fffafd; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-weight: 800; font-size: 0.78rem; }
        .b-pending { background: #fef3c7; color: #92400e; }
        .b-paid { background: #d1fae5; color: #065f46; }
        .b-ref { background: #fee2e2; color: #991b1b; }
        .empty { text-align: center; padding: 36px 16px; color: var(--mute); font-weight: 700; }
    </style>
</head>
<body>
<div class="top">
    <div>
        <h1>🛒 Lịch sử mua hàng</h1>
        <p class="sub">Chỉ hiển thị đơn của tài khoản bạn.</p>
    </div>
    <a th:href="@{/}">← Về shop</a>
</div>
<p th:if="${errorMessage}" style="color:#b91c1c;font-weight:800;max-width:720px;margin:0 auto 16px;text-align:center" th:text="${errorMessage}"></p>
<div class="panel">
    <table th:if="${!#lists.isEmpty(orders)}">
        <thead>
        <tr><th>Đơn</th><th>Trạng thái</th><th>Tổng</th><th>Ngày</th></tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td><a th:href="@{/my-orders/{id}(id=${o.id})}" th:text="'#' + ${o.id}">#1</a></td>
            <td>
                <span th:if="${o.status.name() == 'PAID'}" class="badge b-paid">Đã thanh toán</span>
                <span th:if="${o.status.name() == 'REFUNDED'}" class="badge b-ref">Hoàn tiền</span>
            </td>
            <td th:text="${o.totalAmount} + 'đ'">0đ</td>
            <td th:text="${#dates.format(o.createdAt, 'dd/MM/yyyy HH:mm')}">-</td>
        </tr>
        </tbody>
    </table>
    <div th:if="${#lists.isEmpty(orders)}" class="empty">Bạn chưa có đơn nào. Thêm acc vào giỏ và tạo đơn từ trang giỏ hàng nhé.</div>
</div>
<p style="text-align:center;margin-top:20px"><a th:href="@{/profile}">Hồ sơ</a> · <a th:href="@{/cart}">Giỏ hàng</a></p>
<!-- Music Control -->
<script>
(function() {
    const audioSource = '/audio/Pokiwar Music.mp3';
    let bgMusic = null;
    let audioCreated = false;
    function createAudio() {
        if (audioCreated) return;
        bgMusic = document.createElement('audio');
        bgMusic.loop = true;
        bgMusic.preload = 'none';
        bgMusic.innerHTML = '<source src="' + audioSource + '" type="audio/mpeg">';
        bgMusic.volume = 0.15;
        document.body.appendChild(bgMusic);
        audioCreated = true;
    }
    let isMuted = localStorage.getItem('musicMuted') === 'true';
    function toggleMusic() {
        createAudio();
        isMuted = !isMuted;
        localStorage.setItem('musicMuted', isMuted);
        const icon = document.getElementById('musicBtnIcon');
        const label = document.getElementById('musicBtnLabel');
        if (isMuted) { bgMusic.pause(); icon.textContent = '🔇'; label.textContent = 'Bật nhạc'; }
        else { bgMusic.play().catch(() => {}); icon.textContent = '🔊'; label.textContent = 'Tắt nhạc'; }
    }
    document.addEventListener('DOMContentLoaded', function() {
        const btn = document.createElement('button');
        btn.id = 'musicBtn';
        btn.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;padding:12px 18px;border:none;border-radius:50px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:700;font-size:0.85rem;cursor:pointer;box-shadow:0 4px 20px rgba(102,126,234,0.4);display:flex;align-items:center;gap:8px;transition:all 0.3s ease;font-family:inherit;';
        btn.innerHTML = '<span id="musicBtnIcon">' + (isMuted ? '🔇' : '🔊') + '</span><span id="musicBtnLabel">' + (isMuted ? 'Bật nhạc' : 'Tắt nhạc') + '</span>';
        btn.onclick = toggleMusic;
        btn.title = 'Bật/Tắt nhạc nền';
        document.body.appendChild(btn);
        if (!isMuted) {
            document.addEventListener('click', function init() { createAudio(); bgMusic.play().catch(() => {}); document.removeEventListener('click', init); }, { once: true });
        }
    });
    window.addEventListener('storage', function(e) {
        if (e.key === 'musicMuted' && bgMusic) {
            isMuted = e.newValue === 'true';
            if (isMuted) bgMusic.pause();
            else bgMusic.play().catch(() => {});
            const icon = document.getElementById('musicBtnIcon');
            const label = document.getElementById('musicBtnLabel');
            if (icon) icon.textContent = isMuted ? '🔇' : '🔊';
            if (label) label.textContent = isMuted ? 'Bật nhạc' : 'Tắt nhạc';
        }
    });
})();
</script>
</body>
</html>
