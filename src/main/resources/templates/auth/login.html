<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth-cute.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="falling-hearts" aria-hidden="true">
    <span>❤</span><span>✿</span><span>❤</span><span>❀</span><span>❤</span>
    <span>✿</span><span>❤</span><span>❀</span><span>❤</span><span>✿</span>
</div>
<div class="page-wrap">
    <div class="card">
        <div class="badge">❤ Sweet Login ❤</div>
        <h2 class="title">Đăng nhập</h2>
        <p class="subtitle">Nhập tên người dùng và mật khẩu để vào hệ thống.</p>

        <div class="msg error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="msg success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <form th:action="@{/auth/login}" method="post">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button class="btn" type="submit">Đăng nhập</button>
        </form>

        <div class="divider"><span>hoặc</span></div>

        <div class="social-login">
            <a th:href="@{/oauth2/authorization/google}" class="btn-social btn-google">
                <i class="fab fa-google"></i> Google
            </a>
            <a th:href="@{/oauth2/authorization/facebook}" class="btn-social btn-facebook">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
        </div>

        <div class="links">
            <a th:href="@{/auth/forgot-password}">Quên mật khẩu</a>
            <a th:href="@{/auth/register}">Đăng ký</a>
            <a th:href="@{/auth}">Trang chính</a>
        </div>
    </div>
</div>
</body>
</html>
