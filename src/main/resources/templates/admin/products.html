<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm — Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin-panel.css}">
</head>
<body class="admin-body">
<div class="admin-app">
    <aside th:replace="~{admin/fragments :: sidebar (active='products')}"></aside>
    <div class="admin-main">
        <header class="admin-main-header">
            <div>
                <div class="admin-breadcrumb"><a th:href="@{/admin}">Admin</a> / Sản phẩm</div>
                <h1>Sản phẩm trên shop</h1>
                <p>Giá, mô tả hiển thị ở trang chủ và ẩn/hiện từng gói acc.</p>
            </div>
        </header>
        <div class="admin-content">
            <p th:if="${successMessage}" class="admin-alert admin-alert--ok" th:text="${successMessage}"></p>
            <p th:if="${errorMessage}" class="admin-alert admin-alert--err" th:text="${errorMessage}"></p>
            <div class="admin-panel" th:each="p : ${products}">
                <div class="admin-product-card">
                    <h3 th:text="${p.name}">Tên</h3>
                    <p class="admin-muted">Slug: <strong th:text="${p.slug}">-</strong></p>
                    <p class="admin-muted" style="color:#a855f7;font-weight:700" th:if="${p.game != null}">Game: <span th:text="${p.game.name}">-</span></p>
                    <p class="admin-muted" style="color:#ef4444;font-weight:700" th:if="${p.game == null}">⚠️ Chưa phân loại game!</p>
                    <form class="admin-form-grid" th:action="@{/admin/products/{id}(id=${p.id})}" method="post">
                        <label>Giá (VNĐ)</label>
                        <input type="number" name="price" th:value="${p.price}" required min="0">
                        <label>Mô tả</label>
                        <textarea name="description" rows="4" th:text="${p.description}"></textarea>
                        <label>Hiển thị trên shop</label>
                        <select name="visible">
                            <option th:value="true" th:selected="${p.visible}">Có</option>
                            <option th:value="false" th:selected="${!p.visible}">Không</option>
                        </select>
                        <button class="admin-btn admin-btn--primary" style="margin-top:14px" type="submit">Lưu thay đổi</button>
                    </form>
                    <form th:action="@{/admin/products/{id}/delete(id=${p.id})}" method="post" style="margin-top:12px"
                          onsubmit="return confirm('Xóa sản phẩm này và tất cả acc liên quan?')">
                        <button class="admin-btn admin-btn--danger" type="submit">🗑️ Xóa sản phẩm</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
